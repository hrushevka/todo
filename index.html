<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>ToDo - лист</h1>
    <div class="Main">
        <div class="Form">
            <div class="Adder">
                <input type="text" class="adder-inp" onchange="">
                <button class="adder-add">Добавить</button>
            </div>
            <div class="sort">
                <span>Сортировка</span>
                <button class="sort-all">Все</button>
                <button class="sort-active">Активные</button>
                <button class="sort-done">Завершённое</button>
            </div>
        </div>
        <div class="List">
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
